<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check In | CLASSIC SAN SEBASTIAN CLUB</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#000;
color:#d4af37;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.card{
width:90%;
max-width:600px;
padding:40px;
border:1px solid #d4af37;
border-radius:20px;
background:#111;
}

h1{
margin-bottom:20px;
}

#status{
font-size:24px;
line-height:1.8;
}

.success{
color:#4caf50;
}

.warning{
color:#ff9800;
}

</style>

</head>

<body>

<div class="card">

<h1>CLASSIC SAN SEBASTIAN CLUB</h1>

<div id="status">
Checking Member...
</div>

</div>

<script>

const client = window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

async function checkIn(){

const status =
document.getElementById("status");

const memberCode =
localStorage.getItem("memberCode");

if(!memberCode){

window.location.href =
"login.html";

return;

}

const { data, error } =
await client
.from("members")
.select("*")
.eq("member_code", memberCode)
.single();

if(error || !data){

status.innerHTML =
"❌ Member Not Found";

return;

}

const now = new Date();

if(data.last_scan_at){

const lastScan =
new Date(data.last_scan_at);

const diffHours =
(now - lastScan) / (1000 * 60 * 60);

if(diffHours < 1){

status.innerHTML =
"⏳ Check-In already used.<br><br>Please wait 1 hour.";

return;

}

}

let visits =
data.visits || 0;

let points =
data.points || 0;

let coupons =
data.coupons || 0;

const today =
now.toISOString().split("T")[0];

let firstVisitToday = true;

if(data.last_scan_at){

const lastDay =
new Date(data.last_scan_at)
.toISOString()
.split("T")[0];

if(lastDay === today){

firstVisitToday = false;

}

}

let message = "";

if(firstVisitToday){

visits += 1;
points += 1;

message =
"⭐ Daily Point Earned";

}else{

coupons += 1;

message =
"🎁 Coupon Earned";

}

if(coupons >= 10){

coupons = 0;
points += 1;

message +=
"<br><br>🏆 10 Coupons Converted To 1 Point";

}

const updateResult =
await client
.from("members")
.update({

visits: visits,

points: points,

coupons: coupons,

last_scan_at: now.toISOString()

})
.eq("member_code", memberCode);

if(updateResult.error){

status.innerHTML =
"❌ Database Update Failed";

return;

}

status.innerHTML =

`
<div class="success">

✅ Check-In Successful

<br><br>

Member: ${memberCode}

<br><br>

${message}

<br><br>

Visits: ${visits}

<br>

Points: ${points}

<br>

Coupons: ${coupons}

</div>
`;

}

checkIn();

</script>

</body>
</html>
