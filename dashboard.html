<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | CLASSIC SAN SEBASTIAN CLUB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.88)
),
url("berlin-bg.png");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
min-height:100vh;
}

.container{

max-width:1200px;

margin:auto;

padding:30px 20px;
}

.logo{

width:140px;

display:block;

margin:auto;
}

.title{

text-align:center;

margin-top:15px;

font-size:32px;

font-weight:800;
}

.subtitle{

text-align:center;

color:#d4af37;

margin-bottom:40px;
}

.member-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:1px solid rgba(212,175,55,.25);

border-radius:25px;

padding:30px;

text-align:center;

margin-bottom:30px;
}

.avatar{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid #d4af37;

margin-bottom:15px;
}

.member-name{

font-size:28px;

font-weight:700;
}

.member-id{

color:#d4af37;

margin-top:8px;
}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:20px;
}

.stat{

background:rgba(255,255,255,.05);

border:1px solid rgba(212,175,55,.15);

padding:25px;

border-radius:20px;

text-align:center;
}

.stat h2{

font-size:40px;

color:#d4af37;
}

.stat p{

margin-top:8px;
}

.menu{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;
}

.menu a{

text-decoration:none;

background:rgba(255,255,255,.05);

border:1px solid rgba(212,175,55,.15);

padding:25px;

border-radius:20px;

text-align:center;

color:white;

font-weight:600;
}

.menu a:hover{

border-color:#d4af37;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 class="title">
CLASSIC SAN SEBASTIAN CLUB
</h1>

<p class="subtitle">
Member Dashboard
</p>

<div class="member-card">

<img
src="logo.png"
class="avatar"
id="memberPhoto">

<div class="member-name" id="memberName">
Loading...
</div>

<div class="member-id" id="memberCode">
Loading...
</div>

</div>

<div class="stats">

<div class="stat">
<h2>0</h2>
<p>Visits</p>
</div>

<div class="stat">
<h2>0</h2>
<p>Points</p>
</div>

<div class="stat">
<h2>Bronze</h2>
<p>Rank</p>
</div>

</div>

<div class="menu">

<a href="#">
🎁 Rewards
</a>

<a href="#">
👤 Profile
</a>

<a href="#">
📷 Share Card
</a>

<a href="#">
☕ Club Menu
</a>

</div>

</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  
const client = window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

async function loadMember(){

const memberCode =
localStorage.getItem("memberCode");



if(!memberCode){
return;
}
  
const { data, error } =
await client
.from("members")
.select("*")
.eq("member_code", memberCode)
.single();

if(error){
console.log(error);
return;
}
  
document.getElementById("memberName").innerText =
data.name;

document.getElementById("memberCode").innerText =
data.member_code;

if(data.photo_url){
    document.getElementById("memberPhoto").src =
    data.photo_url;
}

console.log(data);

document.querySelectorAll(".stat h2")[0].textContent =
data.visits || 0;

document.querySelectorAll(".stat h2")[1].textContent =
data.points || 0;

document.querySelectorAll(".stat h2")[2].textContent =
data.rank || "Bronze";
}

loadMember();

</script>
