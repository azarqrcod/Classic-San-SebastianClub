  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  
const client = window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

async function loadMember(){

const memberCode =
localStorage.getItem("memberCode");


if(!memberCode){

window.location.href =
"login.html";

return;

}
  
const { data, error } =
await client
.from("members")
.select("*")
.eq("member_code", memberCode)
.single();

if(error){
console.log(error);
return;
}
  
document.getElementById("memberName").innerText =
data.name;

document.getElementById("memberCode").innerText =
data.member_code;

if(data.photo_url){
    document.getElementById("memberPhoto").src =
    data.photo_url;
}

console.log(data);

document.querySelectorAll(".stat h2")[0].textContent =
data.visits || 0;

document.querySelectorAll(".stat h2")[1].textContent =
data.points || 0;

document.querySelectorAll(".stat h2")[2].textContent =
data.rank || "Bronze";
}

  async function loadDailyNote(){

const today = new Date();

const start =
new Date(today.getFullYear(),0,0);

const diff =
today - start;

const oneDay =
1000 * 60 * 60 * 24;

const dayNumber = 1;

const { data , error } =
await client
.from("daily_notes")
.select("*")
.eq("day_number", dayNumber)
.single();

if(error || !data){
return;
}

document.getElementById("dailyDate")
.innerText =
today.toLocaleDateString("en-GB",{
day:"numeric",
month:"long",
year:"numeric"
});

document.getElementById("dailyMessage")
.innerText =
data.message;

  }
loadMember();
loadDailyNote();
  loadBirthday();

  async function loadBirthday(){

const memberCode =
localStorage.getItem("memberCode");

const { data , error } =
await client
.from("members")
.select("birthday")
.eq("member_code", memberCode)
.single();

if(error || !data || !data.birthday){
return;
}

const today = new Date();

const birth = new Date(data.birthday);

let nextBirthday =
new Date(
today.getFullYear(),
birth.getMonth(),
birth.getDate()
);

if(nextBirthday < today){

nextBirthday =
new Date(
today.getFullYear()+1,
birth.getMonth(),
birth.getDate()
);

}

const diff =
nextBirthday - today;

const daysLeft =
Math.ceil(
diff / (1000*60*60*24)
);

document.getElementById("birthdayDays")
.innerText = daysLeft;

document.getElementById("birthdayDate")
.innerText =
birth.toLocaleDateString(
"en-GB",
{
day:"numeric",
month:"long"
}
);

if(daysLeft === 0){

document.getElementById("birthdayDays")
.innerText = "🎉";

document.getElementById("birthdayDate")
.innerText =
"Happy Birthday! Your Surprise Awaits";
}

  }
  function logout(){

localStorage.removeItem("memberCode");

window.location.href =
"login.html";

}
</script>
