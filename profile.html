<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Profile | CLASSIC SAN SEBASTIAN CLUB</title><style>

body{
background:#000;
color:white;
font-family:Poppins,sans-serif;
padding:30px;
text-align:center;
}

.card{
max-width:700px;
margin:auto;
background:#111;
padding:30px;
border-radius:20px;
border:1px solid #d4af37;
}

h1{
color:#d4af37;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #d4af37;
object-fit:cover;
margin-bottom:20px;
}

.info{
margin:15px 0;
font-size:18px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

</style></head><body><div class="card"><img
id="memberPhoto"
class="avatar"
src="logo.png">

<h1 id="memberName">
Loading...
</h1><div
id="memberCode"
class="info">
Loading...
</div><div
id="memberPoints"
class="info">
Points: 0
</div><div
id="memberVisits"
class="info">
Visits: 0
</div><a
href="dashboard.html"
class="btn">

Back To Dashboard

</a></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>

const client = window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

async function loadProfile(){

const memberCode =
localStorage.getItem("memberCode");

if(!memberCode){

window.location.href =
"login.html";

return;

}

const { data } =
await client
.from("members")
.select("*")
.eq("member_code",memberCode)
.single();

if(!data) return;

document.getElementById("memberName")
.innerText =
data.name || "Member";

document.getElementById("memberCode")
.innerText =
data.member_code || "";

document.getElementById("memberPoints")
.innerText =
"Points: " + (data.points || 0);

document.getElementById("memberVisits")
.innerText =
"Visits: " + (data.visits || 0);

if(data.photo_url){

document.getElementById("memberPhoto")
.src =
data.photo_url;

}

}

loadProfile();

</script></body>
</html>
