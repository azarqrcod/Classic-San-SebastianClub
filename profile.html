<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | CLASSIC SAN SEBASTIAN CLUB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.25),
rgba(0,0,0,.45)
),
url("berlin-bg.png");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:#fff;
padding:30px 20px;

}

.card{

background:rgba(10,10,10,.55);

backdrop-filter:blur(8px);

border:1px solid rgba(212,175,55,.35);

border-radius:25px;

padding:30px;

margin-bottom:25px;

}

.profile{
text-align:center;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #d4af37;
margin-bottom:20px;
}

.name{
font-size:34px;
font-weight:700;
color:#d4af37;
}

.code{
margin-top:10px;
font-size:18px;
color:#bbb;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-top:25px;
}

.stat{
background:#151515;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
color:#d4af37;
font-size:28px;
margin-bottom:8px;
}

.info{
display:grid;
gap:15px;
}

.row{
background:#151515;
padding:18px;
border-radius:15px;
}

.label{
color:#d4af37;
font-size:14px;
margin-bottom:5px;
}

.value{
font-size:18px;
}

.btn{
display:block;
text-align:center;
background:#d4af37;
color:#000;
padding:16px;
border-radius:15px;
font-weight:700;
text-decoration:none;
margin-top:20px;
}

.title{
text-align:center;
font-size:36px;
font-weight:800;
color:#d4af37;
margin-bottom:25px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
👤 Member Profile
</div>

<div class="card profile">

<img id="photo"
class="avatar"
src="logo.png">

<div id="name"
class="name">
Loading...
</div>

<div id="code"
class="code">
Loading...
</div>

</div>

<div class="card">

<div class="stats">

<div class="stat">
<h2 id="points">0</h2>
<div>Points</div>
</div>

<div class="stat">
<h2 id="visits">0</h2>
<div>Visits</div>
</div>

<div class="stat">
<h2 id="coupons">0</h2>
<div>Coupons</div>
</div>

<div class="stat">
<h2 id="receipts">0</h2>
<div>Receipts</div>
</div>

</div>

</div>

<div class="card">

<div class="info">

<div class="row">
<div class="label">Email</div>
<div id="email" class="value">-</div>
</div>

<div class="row">
<div class="label">Phone</div>
<div id="phone" class="value">-</div>
</div>

<div class="row">
<div class="label">Birthday</div>
<div id="birthday" class="value">-</div>
</div>

<div class="row">
<div class="label">Rank</div>
<div id="rank" class="value">Bronze</div>
</div>

<div class="row">
<div class="label">Membership</div>
<div class="value">CLASSIC SAN SEBASTIAN CLUB</div>
</div>

</div>

</div>

<a href="dashboard.html" class="btn">
← Back To Dashboard
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

async function loadProfile(){

const memberCode =
localStorage.getItem("memberCode");

if(!memberCode){

window.location.href =
"login.html";

return;
}

const { data , error } =
await client
.from("members")
.select("*")
.eq("member_code",memberCode)
.single();

if(error){
console.log(error);
return;
}

document.getElementById("name").innerText =
data.name || "-";

document.getElementById("code").innerText =
data.member_code || "-";

document.getElementById("email").innerText =
data.email || "-";

document.getElementById("phone").innerText =
data.phone || "-";

document.getElementById("birthday").innerText =
data.birthday || "-";

document.getElementById("rank").innerText =
data.rank || "Bronze";

document.getElementById("points").innerText =
data.points || 0;

document.getElementById("visits").innerText =
data.visits || 0;

document.getElementById("coupons").innerText =
data.coupons || 0;

document.getElementById("receipts").innerText =
data.receipt_count || 0;

if(data.photo_url){
document.getElementById("photo").src =
data.photo_url;
}

}

loadProfile();

</script>

</body>
</html>
