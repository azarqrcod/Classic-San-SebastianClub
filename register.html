<form id="memberForm">  <input type="text" id="name" placeholder="Name" required>
  <br><br>  <input type="email" id="email" placeholder="Email" required>
  <br><br>  <input type="text" id="phone" placeholder="Phone (Optional)">
  <br><br><button type="submit">Register</button>

</form><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>

const client = window.supabase.createClient(
  "https://uzecfsxdngdtzwianhir.supabase.co",
  "sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

document
.getElementById("memberForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  const name =
    document.getElementById("name").value.trim();

  const email =
    document.getElementById("email").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const memberCode =
    "AZ" +
    crypto.randomUUID()
      .replace(/-/g, "")
      .substring(0, 8)
      .toUpperCase();

  const { data: existingMember } =
    await client
      .from("members")
      .select("id")
      .eq("email", email)
      .maybeSingle();

  if (existingMember) {
    alert("This email is already registered.");
    return;
  }

  const { error: authError } =
    await client.auth.signInWithOtp({
      email: email,
      options: {
        emailRedirectTo:
          "https://azarqrcod.github.io/Classic-San-SebastianClub/"
      }
    });

  if (authError) {
    alert(authError.message);
    return;
  }

  const { error } =
    await client
      .from("members")
      .insert([
        {
          name: name,
          email: email,
          phone: phone,
          member_code: memberCode,
          points: 0,
          visits: 0,
          rank: "Bronze"
        }
      ]);

  if (error) {
    alert(error.message);
    return;
  }

  alert(
    "Registration successful. Please check your email."
  );

  document
    .getElementById("memberForm")
    .reset();

});

</script>
