<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test Supabase</title>
</head>
<body>

<button id="testBtn">TEST DB</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL =
"https://uzecfsxdngdtzwianhir.supabase.co";

const SUPABASE_KEY =
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC";

const supabaseClient =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

document
.getElementById("testBtn")
.addEventListener("click", async () => {

  try {

    const { data, error } =
      await supabaseClient
      .from("members")
      .select("*");

    if (error) {
      alert(error.message);
      return;
    }

    alert("CONNECTED\nRows: " + data.length);

  } catch (e) {
    alert("ERROR: " + e.message);
  }

});
</script>

</body>
</html>
