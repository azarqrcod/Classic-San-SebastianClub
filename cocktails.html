<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cocktails</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#000;
color:white;
}

.hero{
height:300px;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:end;
padding:25px;
}

.overlay h1{
color:#d4af37;
font-size:38px;
}

.back{
display:inline-block;
margin:20px;
padding:12px 20px;
background:#d4af37;
color:#000;
text-decoration:none;
border-radius:12px;
font-weight:700;
}

.menu{
max-width:900px;
margin:auto;
padding:20px;
}

.item{
display:flex;
justify-content:space-between;
padding:18px;
margin-bottom:12px;
background:#111;
border-radius:14px;
border:1px solid rgba(212,175,55,.25);
}

.price{
color:#d4af37;
font-weight:700;
}

.special{
margin-top:30px;
padding:20px;
text-align:center;
background:#111;
border-radius:15px;
border:2px solid #d4af37;
font-size:24px;
color:#d4af37;
font-weight:bold;
}

</style>

</head>

<body>

<a class="back" href="club-menu.html">
← Back
</a>

<div class="hero">

<img src="images/cocktails/main.jpg">

<div class="overlay">
<h1>🍹 Cocktails</h1>
</div>

</div>

<div class="menu">

<div class="item">
<span>Virgin Mojito</span>
<span class="price">8,50 €</span>
</div>

<div class="item">
<span>Strawberry Smash</span>
<span class="price">8,50 €</span>
</div>

<div class="item">
<span>Watermelon Spritz</span>
<span class="price">8,50 €</span>
</div>

<div class="item">
<span>Maracuja Punsch</span>
<span class="price">8,50 €</span>
</div>

<div class="item">
<span>Peach Cooler</span>
<span class="price">8,50 €</span>
</div>

<div class="item">
<span>San Sebastian Haus Limo</span>
<span class="price">8,50 €</span>
</div>

<div class="special">
❤️ ALL COCKTAILS 8,50 €
</div>

</div>

</body>
</html>
