<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Share Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.80)
),
url("cafe-share-bg.jpg");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

min-height:100vh;

padding:20px;
}

.card{

width:100%;
max-width:420px;

background:rgba(0,0,0,.45);

backdrop-filter:blur(10px);

border:2px solid rgba(212,175,55,.4);

border-radius:30px;

padding:30px;

text-align:center;

color:white;

box-shadow:
0 0 30px rgba(212,175,55,.15);

}

.logo-title{

font-size:28px;

font-weight:800;

color:#d4af37;

line-height:1.2;

margin-bottom:20px;
}

.avatar{

width:130px;
height:130px;

border-radius:50%;

object-fit:cover;

border:4px solid #d4af37;

margin:15px auto;

display:block;

box-shadow:
0 0 20px rgba(212,175,55,.35);

}

.member{

font-size:28px;

font-weight:700;

margin-top:10px;
}

.code{

font-size:18px;

color:#d4af37;

margin-top:8px;
}

.rank{

font-size:18px;

margin-top:15px;

opacity:.9;
}

.points{

font-size:34px;

font-weight:800;

color:#d4af37;

margin-top:20px;
}

.club{

margin-top:25px;

font-size:16px;

line-height:1.8;

opacity:.9;
}

.buttons{

margin-top:25px;

display:flex;

justify-content:center;

gap:12px;

flex-wrap:wrap;
}

button{

background:#d4af37;

color:black;

border:none;

padding:14px 22px;

border-radius:12px;

font-size:15px;

font-weight:700;

cursor:pointer;
}

button:hover{

opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<div class="logo-title">
CLASSIC SAN<br>
SEBASTIAN CLUB
</div>

<img
id="memberPhoto"
class="avatar"
src="logo.png">

<div
class="member"
id="memberName">
Member
</div>

<div
class="code"
id="memberCode">
AZ0000
</div>

<div
class="rank"
id="memberRank">
Bronze Member
</div>

<div
class="points"
id="memberPoints">
⭐ 0 Points
</div>

<div class="club">
📍 Berlin<br>
Classic San Sebastian Club
</div>

</div>

<div class="buttons">

<button onclick="downloadCard()">
⬇ Download
</button>

<button onclick="shareCard()">
📸 Share
</button>

</div>

<script>

const client =
window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
`"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC" `
);

async function loadMember(){

const memberCode =
localStorage.getItem("memberCode");

if(!memberCode){

window.location.href =
"login.html";

return;

}

const { data , error } =
await client
.from("members")
.select("*")
.eq("member_code",memberCode)
.single();

if(error || !data){
return;
}

document.getElementById("memberName").innerText =
data.name || "Member";

document.getElementById("memberCode").innerText =
data.member_code || "";

document.getElementById("memberRank").innerText =
(data.rank || "Bronze") + " Member";

document.getElementById("memberPoints").innerText =
"⭐ " + (data.points || 0) + " Points";

if(data.photo_url){

document.getElementById("memberPhoto").src =
data.photo_url;

}

}

function downloadCard(){

alert(
"PNG export will be added next"
);

}

async function shareCard(){

if(navigator.share){

try{

await navigator.share({

title:
"CLASSIC SAN SEBASTIAN CLUB",

text:
"Member Of Classic San Sebastian Club"

});

}catch(error){

console.log(error);

}

}else{

alert(
"Sharing Not Supported"
);

}

}

loadMember();

</script>

</body>
</html>
