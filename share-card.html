<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Share Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.80)
),
url("cafe-share-bg.jpg");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

min-height:100vh;

padding:20px;
}

.card{

width:90%;
max-width:700px;

background:rgba(0,0,0,.55);

backdrop-filter:blur(12px);

border:2px solid #d4af37;

border-radius:30px;

padding:40px;

text-align:center;

color:white;
}

h1{

color:#d4af37;

font-size:48px;

font-weight:800;

margin-bottom:25px;
}

.member{

font-size:34px;

font-weight:700;

margin-bottom:15px;
}

.code{

font-size:22px;

color:#d4af37;

margin-bottom:25px;
}

.rank{

font-size:28px;

margin-bottom:15px;
}

.points{

font-size:40px;

font-weight:700;

color:#d4af37;

margin-bottom:30px;
}

.club{

font-size:20px;

line-height:1.8;

opacity:.9;
}

.avatar{

width:160px;
height:160px;

border-radius:50%;

object-fit:cover;

border:4px solid #d4af37;

margin:20px auto;

display:block;

box-shadow:0 0 25px rgba(212,175,55,.35);

}
  
.buttons{

margin-top:30px;

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;
}

button{

background:#d4af37;

color:black;

border:none;

padding:15px 25px;

border-radius:15px;

font-size:16px;

font-weight:700;

cursor:pointer;
}

button:hover{

opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<h1>
CLASSIC SAN SEBASTIAN CLUB
</h1>

<img
id="memberPhoto"
class="avatar"
src="logo.png">
  
<div class="member" id="memberName">
Member
</div>

<div class="code" id="memberCode">
AZ0000
</div>

<div class="rank" id="memberRank">
Bronze Member
</div>

<div class="points" id="memberPoints">
⭐ 0 Points
</div>

<div class="club">
Berlin<br>
Classic San Sebastian Club
</div>

</div>

<div class="buttons">

<button onclick="downloadCard()">
⬇ Download Card
</button>

<button onclick="shareCard()">
📸 Share
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = window.supabase.createClient(
"https://uzecfsxdngdtzwianhir.supabase.co",
"sb_publishable_FinqG9Dt2uZSQ-ZaoyALWA_qaSuaRpC"
);

async function loadMember(){

const memberCode =
localStorage.getItem("memberCode");

if(!memberCode){

window.location.href =
"login.html";

return;

}

const { data , error } =
await client
.from("members")
.select("*")
.eq("member_code",memberCode)
.single();

if(error || !data){
return;
}

document.getElementById("memberName").innerText =
data.name || "Member";

if(data.photo_url){

document.getElementById("memberPhoto").src =
data.photo_url;

}
  
document.getElementById("memberCode").innerText =
data.member_code || "";

document.getElementById("memberRank").innerText =
(data.rank || "Bronze") + " Member";

document.getElementById("memberPoints").innerText =
"⭐ " + (data.points || 0) + " Points";

}

function downloadCard(){

const link =
document.createElement("a");

link.href =
"cafe-share-bg.jpg";

link.download =
"CLASSIC-SAN-SEBASTIAN-CLUB.jpg";

link.click();

}

async function shareCard(){

if(navigator.share){

navigator.share({

title:
"CLASSIC SAN SEBASTIAN CLUB",

text:
"Join The Club",

url:
window.location.href

});

}else{

alert(
"Sharing Not Supported"
);

}

}

loadMember();

</script>

</body>
</html>
