<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Café QR</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
padding:20px;
}

h1{
color:#d4af37;
font-size:48px;
font-weight:800;
text-align:center;
margin-bottom:40px;
}

canvas{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 0 30px rgba(212,175,55,.25);
width:700px;
height:700px;
max-width:90vw;
max-height:90vw;
}

.info{
margin-top:30px;
font-size:24px;
color:#d4af37;
font-weight:600;
text-align:center;
}

</style>

</head>

<body>

<h1>
CLASSIC SAN SEBASTIAN CLUB
</h1>

<canvas id="qrcode"></canvas>

<div class="info">
SCAN TO CHECK-IN
</div>

<script>

QRCode.toCanvas(
document.getElementById("qrcode"),
"CLASSIC-SAN-SEBASTIAN-CHECKIN",
{
width:700,
margin:2
}
);

</script>

</body>
</html>
