<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Café QR</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<style>

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:Poppins,sans-serif;
}

h1{
color:#d4af37;
margin-bottom:20px;
}

canvas{
background:white;
padding:20px;
border-radius:20px;
}

</style>

</head>

<body>

<h1>CLASSIC SAN SEBASTIAN CLUB</h1>

<canvas id="qrcode"></canvas>

<script>

QRCode.toCanvas(
document.getElementById("qrcode"),
"CLASSIC-SAN-SEBASTIAN-CHECKIN"
);

</script>

</body>
</html>
